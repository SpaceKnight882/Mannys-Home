<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Admin</title><link rel='stylesheet' href='/style.css'></head><body><main><section class="panel" id="loginPanel"><h1>Terminal Access</h1><p>Password required:</p><input id="pw" type="password"><button id="loginBtn">ENTER</button></section><section class="panel hidden" id="adminPanel"><h1>Admin Board</h1><button id="logoutBtn">Logout</button><h2>Blog Manager</h2><form id="blogForm"><input name="title" placeholder="Title" required><input name="date" type="date"><input name="tags" placeholder="tags"><input name="image" placeholder="Image URL optional"><textarea name="content" placeholder="Content"></textarea><button>Save Post</button></form><div id="adminBlogs"></div><h2>File Uploads</h2><form id="uploadForm" enctype="multipart/form-data"><select name="category"><option>images</option><option>pdfs</option><option>music</option><option>files</option></select><input name="file" type="file" required><button>Upload</button></form><div id="adminFiles"></div><h2>Popup Ads</h2><form id="popupForm"><input name="title" placeholder="title"><input name="text" placeholder="text"><input name="image" placeholder="image URL"><input name="link" placeholder="link"><input name="frequency" type="number" value="45"><button>Add Popup</button></form><h2>Scrolling Ads</h2><form id="scrollForm"><input name="text" placeholder="banner text"><input name="link" placeholder="link"><button>Add Banner</button></form><div id="adsList"></div></section></main><script src="/admin.js"></script><script src='/script.js'></script><script src='/page.js'></script></body></html>
